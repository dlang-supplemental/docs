# D Lang Supplemental documentation site (online)
# Fetches content from GitHub; use for CI and production build

site:
  title: D Lang Supplemental
  start_page: asciidoctor-d:ROOT:index.adoc
content:
  sources:
    - url: https://github.com/dlang-supplemental/asciidoctor-dlang.git
      branches: [main]
      start_path: docs
    - url: https://github.com/dlang-supplemental/densor.git
      branches: [main]
      start_path: docs
    - url: https://github.com/dlang-supplemental/fluidsync-daemon.git
      branches: [main]
      start_path: docs
    - url: https://github.com/dlang-supplemental/vector-store-dlang.git
      branches: [main]
      start_path: docs
    - url: https://github.com/dlang-supplemental/vibe-search-core.git
      branches: [main]
      start_path: docs
    - url: https://github.com/dlang-supplemental/vibe-search-desktop.git
      branches: [main]
      start_path: docs
    - url: https://github.com/dlang-supplemental/graphrag-indexer.git
      branches: [main]
      start_path: docs
    - url: .
      branches: HEAD
      start_path: docs
      worktrees: true
ui:
  bundle:
    url: https://github.com/antora-supplemental/antora-dark-theme/releases/latest/download/ui-bundle.zip
    snapshot: true
output:
  dir: ./build/site

asciidoc:
  attributes:
    source-highlighter: highlight.js
    icons: font
